<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Call log — Our Clinic</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body class="app-shell">
  <header class="app-header">
    <a href="schedule.html" class="brand">Our Clinic</a>
    <nav>
      <a href="schedule.html" data-nav>Today</a>
      <a href="book-walkin.html" data-nav>Walk-in</a>
      <a href="checkin.html" data-nav>Check-in</a>
      <a href="calls.html" data-nav class="active">Call log</a>
    </nav>
    <span class="user-menu"><span data-user-name></span> · <a href="#" data-logout>Sign out</a></span>
  </header>
  <main class="app-main">
    <h1 class="page-title">Phone & IVR call log</h1>
    <p class="page-subtitle">Derived from Kaggle booking-call transcripts (2024/) · PII redacted</p>
    <div class="alert alert-info">Dataset: <a href="https://www.kaggle.com/datasets/ammarshafiq/healthcare-appointment-booking-calls-dataset" target="_blank" rel="noopener">Healthcare Appointment Booking Calls</a></div>
    <div class="filter-bar">
      <div class="form-group">
        <label>Intent</label>
        <select id="filter-intent">
          <option value="">All</option>
          <option value="book">Book</option>
          <option value="cancel">Cancel</option>
          <option value="reschedule">Reschedule</option>
          <option value="inquiry">Inquiry</option>
        </select>
      </div>
      <div class="form-group">
        <label>Service</label>
        <select id="filter-service">
          <option value="">All</option>
          <option value="cardiology">Heart / Cardio</option>
          <option value="general">General Doctor</option>
          <option value="dermatology">Skin Care</option>
        </select>
      </div>
    </div>
    <div id="call-list"></div>
  </main>
  <script src="../js/kaggle-fixtures.js"></script>
  <script src="../js/fixtures.js"></script>
  <script src="../js/app.js"></script>
  <script>
    const session = requireAuth(["FrontDesk", "Admin"]);
    if (session) {
      initShell(session, [], "calls.html");
      const listEl = document.getElementById("call-list");
      function serviceLabel(id) {
        const s = (FIXTURES.services || []).find(x => x.id === id);
        return s ? s.patientLabel : id || "—";
      }
      function render() {
        const intent = document.getElementById("filter-intent").value;
        const service = document.getElementById("filter-service").value;
        let calls = FIXTURES.callRecords || [];
        if (intent) calls = calls.filter(c => c.intent === intent);
        if (service) calls = calls.filter(c => c.serviceId === service);
        listEl.innerHTML = calls.map(c => `<div class="card">
          <h3>${c.callId}</h3>
          <p><strong>${c.intent}</strong> · ${serviceLabel(c.serviceId)} · ${c.bookingChannel.replace("_", " ")}
            ${c.ivrOptions.length ? ` · IVR [${c.ivrOptions.join("][")}]` : ""}</p>
          <p style="font-size:0.85rem;color:#64748b;font-style:italic;">"${c.transcriptExcerpt}"</p>
          <div class="card-actions">
            ${c.intent === "book" && c.serviceId ? `<a href="../patient/search.html?service=${c.serviceId}" class="btn btn-primary btn-sm">Match availability</a>` : ""}
            ${c.intent === "cancel" ? `<span class="badge badge-cancelled">cancel handled</span>` : ""}
          </div>
        </div>`).join("") || `<div class="empty-state">No calls match filters</div>`;
      }
      document.getElementById("filter-intent").addEventListener("change", render);
      document.getElementById("filter-service").addEventListener("change", render);
      render();
    }
  </script>
</body>
</html>
