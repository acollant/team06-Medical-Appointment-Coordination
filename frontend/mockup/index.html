<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — MedAppt Coord</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="auth-page">
    <a href="index.html" class="brand" style="margin-bottom: 24px; font-size: 1.25rem; font-weight: 700; color: #0f172a; text-decoration: none;">MedAppt Coord</a>
    <div class="auth-card">
      <h1>Sign in</h1>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign in</button>
      </form>
      <p style="margin-top: 16px; font-size: 0.9rem;">
        <a href="forgot-password.html">Forgot password?</a> ·
        <a href="register.html">Create account</a>
      </p>
      <div class="demo-roles">
        <p>Demo — quick sign-in by persona:</p>
        <div class="btn-row">
          <button type="button" class="btn btn-secondary btn-sm" data-login-as="P-1">Maria (Patient)</button>
          <button type="button" class="btn btn-secondary btn-sm" data-login-as="P-2">Dr. Chen (Provider)</button>
          <button type="button" class="btn btn-secondary btn-sm" data-login-as="P-3">Elena (Desk)</button>
          <button type="button" class="btn btn-secondary btn-sm" data-login-as="P-4">David (Admin)</button>
        </div>
      </div>
    </div>
  </div>
  <script src="js/fixtures.js"></script>
  <script src="js/app.js"></script>
  <script src="js/role-router.js"></script>
</body>
</html>
