<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — MedAppt Coord</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Create account</h1>
      <form id="register-form">
        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password (min 10 chars)</label>
          <input type="password" id="password" minlength="10" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
      </form>
      <p style="margin-top: 16px; font-size: 0.9rem;"><a href="index.html">Back to sign in</a></p>
    </div>
  </div>
  <script src="js/fixtures.js"></script>
  <script src="js/app.js"></script>
  <script src="js/role-router.js"></script>
</body>
</html>
