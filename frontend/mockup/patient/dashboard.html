<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Care — MedAppt Coord</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body class="app-shell">
  <header class="app-header">
    <a href="dashboard.html" class="brand">MedAppt Coord</a>
    <nav>
      <a href="dashboard.html" data-nav class="active">My Care</a>
      <a href="appointments.html" data-nav>Appointments</a>
    </nav>
    <span class="user-menu"><span data-user-name></span> · <a href="#" data-logout>Sign out</a></span>
  </header>
  <main class="app-main">
    <h1 class="page-title">My Care</h1>
    <p class="page-subtitle" id="patient-greeting"></p>

    <div class="stat-grid" id="clinic-stats"></div>

    <h2 style="font-size: 1rem; margin-bottom: 12px;">Upcoming appointments</h2>
    <div id="upcoming"></div>

    <p style="margin: 24px 0 8px;"><a href="search.html" class="btn btn-primary">+ Book new appointment</a></p>
    <p style="margin: 0 0 24px; font-size: 0.9rem;">
      Quick search:
      <a href="search.html?service=cardiology">Cardio</a> ·
      <a href="search.html?service=general">General doctor</a> ·
      <a href="search.html?service=dermatology">Skin care</a> ·
      <a href="search.html?tab=closest&service=general">Closest general doctor</a>
    </p>

    <h2 style="font-size: 1rem; margin-bottom: 12px;">Our Clinic locations</h2>
    <div id="locations" class="grid-2" style="grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 24px;"></div>

    <h2 style="font-size: 1rem; margin-bottom: 12px;">Recent history</h2>
    <div id="history"></div>
  </main>
  <script src="../js/kaggle-fixtures.js"></script>
  <script src="../js/demo-fixtures.js"></script>
  <script src="../js/fixtures.js"></script>
  <script src="../js/app.js"></script>
  <script>
    const session = requireAuth(["Patient"]);
    if (session) {
      initShell(session, [], "dashboard.html");

      const profile = FIXTURES.patientProfile || {};
      document.getElementById("patient-greeting").textContent =
        profile.address ? `Signed in as ${session.name} · ${profile.address}` : "";

      renderStatGrid(document.getElementById("clinic-stats"), FIXTURES.demoStats);

      document.getElementById("locations").innerHTML = (FIXTURES.locations || []).map(loc => `
        <div class="card">
          <h3>${loc.shortName || loc.name}</h3>
          <p>${loc.address}</p>
          <p>${loc.hours}</p>
        </div>`).join("");

      const appts = getAppointments().filter(a => a.patientId === "P-1");
      const upcoming = appts.filter(a => a.status === "scheduled");
      const past = appts.filter(a => a.status === "completed").slice(0, 3);
      const upEl = document.getElementById("upcoming");

      if (upcoming.length) {
        upEl.innerHTML = upcoming.map(u => `<div class="card">
          <h3>${u.displayDate}</h3>
          <p>${u.provider} · ${u.type}</p>
          <p>${u.location} · <span class="channel-tag">${(u.bookingChannel || "web").replace("_", " ")}</span></p>
          <div class="card-actions">${statusBadge(u.status)}
            <a href="appointments.html" class="btn btn-secondary btn-sm">Manage</a>
          </div>
        </div>`).join("");
      } else {
        upEl.innerHTML = `<div class="empty-state">No upcoming appointments — <a href="search.html">find availability</a></div>`;
      }

      document.getElementById("history").innerHTML = past.length
        ? past.map(a => `<div class="card"><p>${a.displayDate} · ${a.provider} · ${a.type} · ${statusBadge(a.status)}</p></div>`).join("")
        : `<div class="empty-state">No past visits</div>`;
    }
  </script>
</body>
</html>
