<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmed — MedAppt Coord</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body class="app-shell">
  <header class="app-header">
    <a href="dashboard.html" class="brand">MedAppt Coord</a>
    <nav>
      <a href="dashboard.html" data-nav>My Care</a>
      <a href="appointments.html" data-nav>Appointments</a>
    </nav>
    <span class="user-menu"><span data-user-name></span> · <a href="#" data-logout>Sign out</a></span>
  </header>
  <main class="app-main">
    <div class="alert alert-success">Confirmation email sent to your inbox.</div>
    <h1 class="page-title">Booking confirmed</h1>
    <div class="card" id="details"></div>
    <p style="margin-top: 24px;">
      <a href="dashboard.html" class="btn btn-primary">Back to My Care</a>
      <a href="appointments.html" class="btn btn-secondary">View appointments</a>
    </p>
  </main>
  <script src="../js/kaggle-fixtures.js"></script>
  <script src="../js/fixtures.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/search.js"></script>
  <script>
    const session = requireAuth(["Patient"]);
    if (session) {
      initShell(session, [], "confirmation.html");
      const booking = JSON.parse(sessionStorage.getItem("lastBooking") || "{}");
      document.getElementById("details").innerHTML = `
        <h3>${booking.provider || "Dr. James Chen"}</h3>
        <p>${booking.date || "2025-09-08"} at ${booking.time || "10:00"} · Our Clinic</p>
        <p>${booking.type || "Follow-up Visit"}${booking.serviceId ? ` · ${(getServiceById(booking.serviceId) || {}).patientLabel || ""}` : ""} · ${statusBadge("scheduled")}</p>
        <p style="margin-top:8px;font-size:0.85rem;">A reminder will be sent 24 hours before your visit.</p>`;
      showToast("Appointment booked successfully", "success");
    }
  </script>
</body>
</html>
