<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find availability — MedAppt Coord</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .search-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--color-border); padding-bottom: 0; flex-wrap: wrap; }
    .search-tabs button {
      padding: 10px 16px; border: none; background: none; cursor: pointer;
      font-family: inherit; font-size: 0.9rem; color: var(--color-text-muted);
      border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .search-tabs button.active { color: var(--color-primary); border-bottom-color: var(--color-primary); font-weight: 600; }
    .service-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .service-card {
      text-align: left; padding: 16px; border: 2px solid var(--color-border); border-radius: var(--radius);
      background: var(--color-card); cursor: pointer; font-family: inherit; transition: border-color 0.15s;
    }
    .service-card:hover { border-color: var(--color-primary); }
    .service-card.selected { border-color: var(--color-primary); background: #eff6ff; }
    .service-card-title { display: block; font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
    .service-card-sub { display: block; font-size: 0.8rem; color: var(--color-primary); margin-bottom: 6px; }
    .service-card-desc { display: block; font-size: 0.8rem; color: var(--color-text-muted); line-height: 1.4; }
    .availability-day { margin-bottom: 24px; }
    .availability-day-title { font-size: 1rem; margin: 0 0 12px; color: var(--color-text-muted); }
    .availability-list { display: flex; flex-direction: column; gap: 8px; }
    .availability-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 0; }
    .availability-row-main { display: flex; align-items: center; gap: 16px; }
    .availability-time { font-weight: 700; font-size: 1.1rem; min-width: 52px; }
    .availability-row p { margin: 2px 0 0; font-size: 0.85rem; color: var(--color-text-muted); }
    .results-header { margin-bottom: 16px; color: var(--color-text-muted); font-size: 0.9rem; }
    .panel-hidden { display: none; }
    .highlight-card { border: 2px solid var(--color-primary); background: #f8fbff; }
    .highlight-card h3 { margin-top: 8px; }
    .alt-practitioner { border-left: 3px solid var(--color-border); }
    .demo-note { font-size: 0.8rem; color: var(--color-text-muted); margin-top: 16px; }
    .sort-toggle { display: flex; gap: 8px; align-items: center; font-size: 0.85rem; }
    .sort-toggle label { display: flex; align-items: center; gap: 4px; cursor: pointer; font-weight: 400; }
  </style>
</head>
<body class="app-shell">
  <header class="app-header">
    <a href="dashboard.html" class="brand">MedAppt Coord</a>
    <nav>
      <a href="dashboard.html" data-nav>My Care</a>
      <a href="appointments.html" data-nav>Appointments</a>
    </nav>
    <span class="user-menu"><span data-user-name></span> · <a href="#" data-logout>Sign out</a></span>
  </header>
  <main class="app-main">
    <a href="dashboard.html" class="back-link">← Back</a>
    <h1 class="page-title">Find appointment availability</h1>
    <p class="page-subtitle">Search open slots by service, find the closest practitioner, or browse by specialty</p>

    <div class="search-tabs">
      <button type="button" id="tab-by-service" class="active">By service</button>
      <button type="button" id="tab-closest">Closest to me</button>
      <button type="button" id="tab-by-provider">By provider</button>
    </div>

    <!-- US-4.6: Search by clinical service -->
    <div id="panel-by-service">
      <p class="page-subtitle" style="margin-top:0;">What type of care do you need?</p>
      <div class="service-grid" id="service-grid"></div>
      <div class="filter-bar">
        <div class="form-group">
          <label>Location</label>
          <select id="service-location"></select>
        </div>
        <div class="form-group sort-toggle">
          <label><input type="radio" name="service-sort" value="time" checked> Earliest first</label>
          <label><input type="radio" name="service-sort" value="distance"> Nearest first</label>
        </div>
        <button type="button" class="btn btn-primary" id="service-search-btn">Search availability</button>
      </div>
      <div id="service-results"></div>
    </div>

    <!-- US-4.7: Closest practitioner -->
    <div id="panel-closest" class="panel-hidden">
      <p class="page-subtitle" style="margin-top:0;">We'll match you with the nearest practitioner who has an open slot.</p>
      <div class="service-grid" id="closest-service-grid"></div>
      <div class="filter-bar">
        <div class="form-group">
          <label>Your ZIP (demo)</label>
          <input type="text" id="patient-zip" value="11201" maxlength="5" placeholder="11201">
        </div>
        <button type="button" class="btn btn-primary" id="closest-search-btn">Find closest practitioner</button>
      </div>
      <div id="closest-results"></div>
    </div>

    <!-- US-4.1: Search by provider specialty -->
    <div id="panel-by-provider" class="panel-hidden">
      <div class="filter-bar">
        <div class="form-group">
          <label>Specialty</label>
          <select id="specialty"></select>
        </div>
        <div class="form-group">
          <label>Location</label>
          <select id="location"></select>
        </div>
        <button type="button" class="btn btn-primary" id="search-btn">Search providers</button>
      </div>
      <div id="provider-results"></div>
    </div>
  </main>
  <script src="../js/kaggle-fixtures.js"></script>
  <script src="../js/demo-fixtures.js"></script>
  <script src="../js/fixtures.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/search.js"></script>
  <script>
    const session = requireAuth(["Patient"]);
    if (session) {
      initShell(session, [], "search.html");

      let selectedService = "cardiology";
      let selectedClosestService = "cardiology";
      const params = new URLSearchParams(location.search);
      if (params.get("service")) {
        selectedService = params.get("service");
        selectedClosestService = params.get("service");
      }

      const panelService = document.getElementById("panel-by-service");
      const panelClosest = document.getElementById("panel-closest");
      const panelProvider = document.getElementById("panel-by-provider");
      const tabService = document.getElementById("tab-by-service");
      const tabClosest = document.getElementById("tab-closest");
      const tabProvider = document.getElementById("tab-by-provider");

      populateLocationSelect(document.getElementById("service-location"));
      populateLocationSelect(document.getElementById("location"));

      const specialtyEl = document.getElementById("specialty");
      specialtyEl.innerHTML = FIXTURES.specialties
        .map((s) => `<option value="${s}">${s}</option>`)
        .join("");

      function showTab(tab) {
        panelService.classList.toggle("panel-hidden", tab !== "service");
        panelClosest.classList.toggle("panel-hidden", tab !== "closest");
        panelProvider.classList.toggle("panel-hidden", tab !== "provider");
        tabService.classList.toggle("active", tab === "service");
        tabClosest.classList.toggle("active", tab === "closest");
        tabProvider.classList.toggle("active", tab === "provider");
      }

      tabService.addEventListener("click", () => showTab("service"));
      tabClosest.addEventListener("click", () => { showTab("closest"); runClosestSearch(); });
      tabProvider.addEventListener("click", () => showTab("provider"));

      function getSearchOptions() {
        const locVal = document.getElementById("service-location").value;
        const sortBy = document.querySelector('input[name="service-sort"]:checked')?.value || "time";
        return {
          location: locVal || null,
          sortBy,
          patientLat: FIXTURES.patientProfile?.lat,
          patientLng: FIXTURES.patientProfile?.lng,
        };
      }

      function onServiceSelect(id) {
        selectedService = id;
        renderServiceCards(document.getElementById("service-grid"), selectedService, onServiceSelect);
        runServiceSearch();
      }

      function onClosestServiceSelect(id) {
        selectedClosestService = id;
        renderServiceCards(document.getElementById("closest-service-grid"), selectedClosestService, onClosestServiceSelect);
        runClosestSearch();
      }

      renderServiceCards(document.getElementById("service-grid"), selectedService, onServiceSelect);
      renderServiceCards(document.getElementById("closest-service-grid"), selectedClosestService, onClosestServiceSelect);

      function runServiceSearch() {
        renderAvailabilityResults(
          document.getElementById("service-results"),
          selectedService,
          getSearchOptions()
        );
      }

      function runClosestSearch() {
        const zip = document.getElementById("patient-zip").value.trim();
        const zipCoords = {
          "11201": { lat: 40.6892, lng: -73.9857 },
          "10017": { lat: 40.7549, lng: -73.9757 },
          "11354": { lat: 40.758, lng: -73.8305 },
        };
        const coords = zipCoords[zip] || FIXTURES.patientProfile;
        renderClosestMatch(document.getElementById("closest-results"), selectedClosestService, {
          patientLat: coords.lat,
          patientLng: coords.lng,
        });
      }

      document.getElementById("service-search-btn").addEventListener("click", runServiceSearch);
      document.querySelectorAll('input[name="service-sort"]').forEach((el) => {
        el.addEventListener("change", runServiceSearch);
      });
      document.getElementById("closest-search-btn").addEventListener("click", runClosestSearch);

      function renderProviders() {
        const spec = document.getElementById("specialty").value;
        const loc = document.getElementById("location").value;
        let list = FIXTURES.providers.filter((p) => p.specialty === spec);
        if (loc) list = list.filter((p) => p.location === loc);

        const patient = getPatientCoords();
        list = list.map((p) => {
          const km = p.lat != null ? haversineKm(patient.lat, patient.lng, p.lat, p.lng) : null;
          return { ...p, distanceKm: km, distanceLabel: formatDistanceKm(km) };
        }).sort((a, b) => (a.distanceKm ?? Infinity) - (b.distanceKm ?? Infinity));

        const el = document.getElementById("provider-results");
        if (!list.length) {
          el.innerHTML = `<div class="empty-state"><p>No providers found for ${spec}${loc ? ` at ${loc}` : ""}.</p><p>Try broadening your filters.</p></div>`;
          return;
        }
        el.innerHTML = `<p class="results-header">Providers (${list.length})</p>` +
          list.map((p) => `<div class="card">
            <h3>${p.name} · ${p.specialty}</h3>
            <p>${p.location}${p.distanceLabel ? ` · ${p.distanceLabel}` : ""} · Next available: ${p.nextAvailable}</p>
            <div class="card-actions"><a href="book.html?provider=${encodeURIComponent(p.name)}" class="btn btn-primary btn-sm">View slots →</a></div>
          </div>`).join("");
      }

      document.getElementById("search-btn").addEventListener("click", renderProviders);

      runServiceSearch();
      if (params.get("tab") === "provider") showTab("provider");
      if (params.get("tab") === "closest") { showTab("closest"); runClosestSearch(); }
    }
  </script>
</body>
</html>
