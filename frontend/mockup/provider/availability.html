<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Availability — MedAppt Coord</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body class="app-shell">
  <header class="app-header">
    <a href="calendar.html" class="brand">MedAppt Coord</a>
    <nav>
      <a href="calendar.html" data-nav>Calendar</a>
      <a href="availability.html" data-nav class="active">Availability</a>
    </nav>
    <span class="user-menu"><span data-user-name></span> · <a href="#" data-logout>Sign out</a></span>
  </header>
  <main class="app-main">
    <h1 class="page-title">Availability</h1>
    <div class="grid-2">
      <aside class="sidebar-nav">
        <a href="#weekly" class="active">Weekly template</a>
        <a href="#blocks">Time blocks / PTO</a>
      </aside>
      <div>
        <div class="card" id="weekly">
          <h3>Weekly template</h3>
          <p>Tuesday 9:00 AM – 12:00 PM · Main Clinic</p>
          <div class="form-group" style="margin-top:16px;">
            <label>Day</label>
            <select><option>Tuesday</option><option>Wednesday</option></select>
          </div>
          <div class="form-group">
            <label>Hours</label>
            <input type="text" value="09:00 – 12:00">
          </div>
          <button type="button" class="btn btn-primary btn-sm" id="save-template">Save template</button>
        </div>
        <div class="card" id="blocks" style="margin-top:16px;">
          <h3>Block time (PTO / meetings)</h3>
          <div class="form-group">
            <label>Date</label>
            <input type="date" value="2025-09-10">
          </div>
          <div class="form-group">
            <label>Reason</label>
            <input type="text" placeholder="PTO">
          </div>
          <button type="button" class="btn btn-secondary btn-sm" id="add-block">Add block</button>
        </div>
      </div>
    </div>
  </main>
  <script src="../js/fixtures.js"></script>
  <script src="../js/app.js"></script>
  <script>
    const session = requireAuth(["Provider"]);
    if (session) {
      initShell(session, [], "availability.html");
      document.getElementById("save-template").addEventListener("click", () =>
        showToast("Availability template saved", "success"));
      document.getElementById("add-block").addEventListener("click", () =>
        showToast("Time block added — slots blocked", "success"));
    }
  </script>
</body>
</html>
