<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password — MedAppt Coord</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Reset password</h1>
      <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 16px;">Enter your email and we'll send a reset link if an account exists.</p>
      <form id="forgot-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Send reset link</button>
      </form>
      <p style="margin-top: 16px; font-size: 0.9rem;"><a href="index.html">Back to sign in</a></p>
    </div>
  </div>
  <script src="js/fixtures.js"></script>
  <script src="js/app.js"></script>
  <script src="js/role-router.js"></script>
</body>
</html>
